name: release

# Tag a release:  git tag v0.1.0 && git push origin v0.1.0
# → builds sdist+wheel and attaches them to a GitHub Release (no secrets needed).
# To also publish to PyPI: set up Trusted Publishing on PyPI for this repo, then
# add a repo variable PUBLISH_PYPI=true (Settings → Secrets and variables → Actions).

on:
  push:
    tags: ["v*"]

permissions:
  contents: write       # create the GitHub Release
  id-token: write       # PyPI trusted publishing (OIDC)

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: build sdist + wheel
        run: |
          pip install --upgrade build
          python -m build
      - name: GitHub Release with artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
      - name: Publish to PyPI (opt-in)
        if: ${{ vars.PUBLISH_PYPI == 'true' }}
        uses: pypa/gh-action-pypi-publish@release/v1
