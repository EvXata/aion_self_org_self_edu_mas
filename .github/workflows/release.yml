name: release

# Tag a release:  git tag vX.Y.Z && git push origin vX.Y.Z
# → builds sdist+wheel and attaches them to a GitHub Release.
# Anyone installs with:  pip install "git+https://github.com/EvXata/aion_self_org_self_edu_mas.git"

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install --upgrade build && python -m build
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
