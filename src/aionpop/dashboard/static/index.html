<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>AION Populations — find your market & write the ads</title>
<style>
  :root{--bg:#0b0f17;--panel:#141b26;--panel2:#0f1622;--line:#243042;--ink:#e6edf3;
        --mut:#8b97a8;--ok:#3fb950;--acc:#58a6ff;--gold:#e3b341;}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font:14.5px/1.5 -apple-system,Segoe UI,Roboto,Arial,sans-serif}
  header{padding:16px 24px;border-bottom:1px solid var(--line)}
  header h1{font-size:19px;margin:0}
  header p{margin:4px 0 0;color:var(--mut);font-size:13px}
  .wrap{max-width:1020px;margin:0 auto;padding:20px 24px 60px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:18px 20px;margin-bottom:16px}
  .brief{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .brief .full{grid-column:1/3}
  label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--mut);margin-bottom:5px}
  input,select{width:100%;background:#0b1119;border:1px solid var(--line);color:var(--ink);border-radius:9px;padding:10px 12px;font-size:14px;font-family:inherit}
  .go{margin-top:14px;background:var(--acc);color:#04122b;border:0;border-radius:10px;padding:12px 22px;font-weight:800;font-size:15px;cursor:pointer}
  .go:hover{filter:brightness(1.08)}
  .runs{display:flex;gap:7px;flex-wrap:wrap;margin-top:10px}
  .chip{background:var(--panel2);border:1px solid var(--line);border-radius:20px;padding:5px 11px;font-size:12px;cursor:pointer}
  .chip.sel{border-color:var(--acc);color:#fff}
  .prog{display:flex;align-items:center;gap:12px}
  .track{flex:1;height:12px;background:#0b1119;border:1px solid var(--line);border-radius:6px;overflow:hidden}
  .track>i{display:block;height:100%;background:linear-gradient(90deg,#1f6feb,#58a6ff);transition:width .3s}
  h2{font-size:13px;text-transform:uppercase;letter-spacing:.07em;color:var(--mut);margin:2px 0 12px}
  .move{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--line)}
  .move .n{color:var(--acc);font-weight:800}
  .ad{background:var(--panel2);border:1px solid var(--line);border-left:3px solid var(--gold);border-radius:10px;padding:14px 16px;margin-bottom:12px}
  .ad .hl{font-size:16px;font-weight:700;margin-bottom:6px}
  .ad .bd{color:var(--ink);margin-bottom:8px}
  .ad .cta{display:inline-block;background:#1f2a3a;border:1px solid var(--line);border-radius:8px;padding:6px 12px;color:var(--acc);font-weight:600}
  .ad .meta{color:var(--mut);font-size:11.5px;margin-top:9px}
  .wins{display:grid;grid-template-columns:1fr 1fr;gap:14px 28px}
  .win b{font-size:12px;color:var(--mut);text-transform:uppercase;letter-spacing:.05em}
  .lv{display:flex;align-items:center;gap:8px;margin-top:5px;font-size:12.5px}
  .lv .bar{flex:1;height:9px;background:#0b1119;border-radius:5px;overflow:hidden}
  .lv .bar>i{display:block;height:100%;background:var(--ok)}
  .lv .nm{width:190px} .lv .v{width:42px;color:var(--mut);text-align:right;font-variant-numeric:tabular-nums}
  .again{background:var(--ok);color:#03140a;border:0;border-radius:10px;padding:11px 18px;font-weight:800;cursor:pointer}
  .note{color:var(--mut);font-size:12px;margin-top:8px}
  .empty{color:var(--mut)}
  b.hot{color:var(--ink)}
</style>
</head>
<body>
<header>
  <h1>Find your market &amp; write the ads</h1>
  <p>Describe your product. A population explores every go-to-market move — who · where · what you say · the offer · the format — and hands back the best strategic moves + ready-to-use ads. Each run gets smarter.</p>
</header>
<div class="wrap">

  <div class="card">
    <div class="brief">
      <div><label>Product</label><input id="product" value="EcoPlaster"></div>
      <div><label>Region / market</label><input id="region" value="Europe"></div>
      <div class="full"><label>One line — what is it?</label><input id="pitch" value="breathable, non-toxic, carbon-neutral eco-plaster"></div>
      <div><label>Goal</label><select id="goal">
        <option value="awareness">Awareness — they don't know me yet</option>
        <option value="leads">Leads — get qualified interest</option>
        <option value="sales">Sales — convert to orders</option></select></div>
      <div><label>Depth (how thoroughly to explore)</label><select id="gens">
        <option value="12">Quick (~6s)</option><option value="16" selected>Standard (~8s)</option><option value="28">Deep (~14s)</option></select></div>
    </div>
    <button class="go" id="go">▶ Explore the market</button>
    <div class="runs" id="runs"></div>
  </div>

  <div id="out"><div class="card empty">Fill in your product above and hit <b>Explore the market</b>.</div></div>
</div>

<script>
const $=s=>document.querySelector(s);
let selected=null, lastP=-1;

async function refreshRuns(){
  let xs=[]; try{ xs=await (await fetch('/api/runs')).json(); }catch(e){return;}
  if(!selected && xs.length) selected=xs[xs.length-1].id;
  $('#runs').innerHTML = xs.slice().reverse().map(x=>
    `<span class="chip ${x.id===selected?'sel':''}" data-id="${x.id}">${x.product} · ${x.region} ${x.status==='running'?'⏳':'✓'}${x.run_index?(' · run '+x.run_index):''}</span>`).join('');
  document.querySelectorAll('.chip').forEach(c=>c.onclick=()=>{selected=c.dataset.id;lastP=-1;refreshRuns();render();});
}

function moveHTML(m,i){ return `<div class="move"><span class="n">${i+1}</span><span>${m.replace(/\*\*(.+?)\*\*/g,'<b class="hot">$1</b>')}</span></div>`; }
function adHTML(a){ return `<div class="ad"><div class="hl">${a.headline}</div><div class="bd">${a.body}</div>
  <span class="cta">${a.cta}</span><div class="meta">${a.channel} · ${a.segment} · ${a.angle} · offer: ${a.offer} · format: ${a.format} · fit ${a.score}</div></div>`; }
function winHTML(label,levels){ const mx=levels[0]?levels[0][1]:1;
  return `<div class="win"><b>${label}</b>${levels.slice(0,4).map(([nm,v])=>
    `<div class="lv"><span class="nm">${nm}</span><span class="bar"><i style="width:${Math.max(4,v/mx*100)}%"></i></span><span class="v">${v}</span></div>`).join('')}</div>`; }

async function render(){
  if(!selected) return;
  let d; try{ d=await (await fetch('/api/run?id='+encodeURIComponent(selected))).json(); }catch(e){return;}
  if(d.error){ $('#out').innerHTML='<div class="card empty">'+d.error+'</div>'; return; }
  const prog=d.progress||[], last=prog[prog.length-1]||{};
  const sig=prog.length+(d.results?1e6:0); if(sig===lastP) return; lastP=sig;

  if(!d.results){
    const w = last.gen? (last.gen/last.generations*100):4;
    $('#out').innerHTML = `<div class="card"><h2>Exploring the go-to-market space…</h2>
      <div class="prog"><div class="track"><i style="width:${w}%"></i></div>
      <span style="color:var(--mut);font-size:12px">gen ${last.gen||0}/${last.generations||'?'} · ${last.explored||0} of ${last.space||0} combinations · best fit ${last.best||0}</span></div></div>`;
    return;
  }
  const r=d.results, L=r.learnings;
  $('#out').innerHTML = `
    <div class="card"><h2>🎯 Top strategic moves — ${d.brief.product} in ${d.brief.region}</h2>
      ${r.moves.map(moveHTML).join('')}
      <div class="note">Explored ${r.explored} of ${r.space} possible moves · run #${r.run_index} (memory makes each run sharper).</div></div>
    <div class="card"><h2>✍️ Ready-to-use ads (top moves)</h2>${r.ads.map(adHTML).join('')}</div>
    <div class="card"><h2>📊 What wins</h2><div class="wins">
      ${winHTML('Who (segment)',L.segment)}${winHTML('Where (channel)',L.channel)}
      ${winHTML('Message (angle)',L.angle)}${winHTML('The ask (offer)',L.offer)}
      ${winHTML('Format',L.format)}</div></div>
    <div class="card"><button class="again" id="again">🔁 Run again — it gets smarter</button>
      <div class="note">Run the top ads for real, then come back: feed clicks/replies and the same population will certify which moves truly work and refine the rest.</div></div>`;
  $('#again').onclick = ()=>launch(d.brief);
}

async function launch(brief){
  try{
    const r=await (await fetch('/api/run/new',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(brief)})).json();
    selected=r.id; lastP=-1; refreshRuns(); render();
  }catch(e){}
}
$('#go').onclick=()=>launch({product:$('#product').value,region:$('#region').value,pitch:$('#pitch').value,goal:$('#goal').value,generations:+$('#gens').value});

refreshRuns(); render();
setInterval(()=>{refreshRuns();render();},700);
</script>
</body>
</html>
